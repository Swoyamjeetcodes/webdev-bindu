<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bindu Craft Page</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="craft-page">
  <header class="topbar">
    <a class="brand" href="index.html">
      <img src="public/images/bindu.png" alt="Bindu">
    </a>

    <nav class="topnav" aria-label="Main navigation">
      <a href="#">
        <span class="nav-icon">●</span>
        Location
      </a>
      <a class="active" href="craft.html">
        <span class="nav-icon">♟</span>
        Community
      </a>
      <a href="#">
        <span class="nav-icon text-icon">Aa</span>
        Language
      </a>
      <a href="#">
        <span class="nav-icon">✚</span>
        Accessibility
      </a>
      <a href="#">
        <span class="nav-icon">◕</span>
        Profile
      </a>
    </nav>
  </header>

  <main class="page">
    <section class="heading-row">
      <button class="back-button" aria-label="Go back">‹</button>
      <h1>Community</h1>
    </section>

    <label class="search-box">
      <span class="search-icon" aria-hidden="true"></span>
      <input type="search" placeholder="Search by handicraft, handloom, Artisan">
    </label>

    <section class="quick-row" aria-label="Community shortcuts">
      <button class="create-card">
        <span class="plus">+</span>
        <span>Create</span>
      </button>

      <article class="story-card">
        <img src="public/images/craft-1.jpg" alt="Colorful handmade textile mask">
        <span class="avatar pink">A</span>
      </article>

      <article class="story-card">
        <img src="public/images/craft-2.jpg" alt="Hands shaping pottery clay">
        <span class="avatar red">G</span>
      </article>

      <article class="story-card">
        <img src="public/images/craft-3.jpg" alt="Artisan working on traditional craft">
        <span class="avatar gold">T</span>
      </article>
    </section>

    <section class="feed" aria-label="Community posts">
      <article class="post-card">
        <div class="post-photo">
          <img src="public/images/craft-4.jpg" alt="Artisan carving a traditional handmade object">
          <span class="avatar pink">A</span>
        </div>
        <div class="post-actions">
          <button class="like liked" aria-label="Like">♥</button>
          <button aria-label="Comment">♡</button>
          <button class="send" aria-label="Share">➤</button>
        </div>
      </article>

      <article class="post-card">
        <div class="post-photo">
          <img src="public/images/craft-5.jpg" alt="Bright embroidered floral textile">
          <span class="avatar gold">T</span>
        </div>
        <div class="post-actions">
          <button class="like liked" aria-label="Like">♥</button>
          <button aria-label="Comment">♡</button>
          <button class="send" aria-label="Share">➤</button>
        </div>
      </article>

      <article class="post-card">
        <div class="post-photo">
          <img src="public/images/craft-1.jpg" alt="Hand-painted folk artwork">
          <span class="avatar pink">A</span>
        </div>
        <div class="post-actions">
          <button class="like" aria-label="Like">♡</button>
          <button aria-label="Comment">♡</button>
          <button class="send" aria-label="Share">➤</button>
        </div>
      </article>

      <article class="post-card">
        <div class="post-photo">
          <img src="public/images/craft-2.jpg" alt="Detailed beaded handmade craft">
          <span class="avatar pink">A</span>
        </div>
        <div class="post-actions">
          <button class="like" aria-label="Like">♡</button>
          <button aria-label="Comment">♡</button>
          <button class="send" aria-label="Share">➤</button>
        </div>
      </article>
    </section>

    <section class="craft-gallery-section">
      <h2>More Photos From Artisans</h2>
      <div class="craft-gallery">
        <article>
          <img src="public/images/home-pottery.jpg" alt="Decorated pottery made by artisans">
        </article>
        <article>
          <img src="public/images/home-textile.jpg" alt="Traditional textile pattern">
        </article>
        <article>
          <img src="public/images/home-painting.jpg" alt="Bright folk painting craft">
        </article>
        <article>
          <img src="public/images/home-color.jpg" alt="Colorful handmade craft material">
        </article>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <a class="footer-logo" href="index.html">
      <img src="public/images/bindu.png" alt="Bindu">
    </a>
    <p>Celebrating handmade craft, textiles, stories, and community culture.</p>
    <div class="footer-links">
      <a href="index.html">Home</a>
      <a href="craft.html">Craft Page</a>
      <a href="#">Community</a>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
